name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify plugin
        run: |
          npm ci
          npm test
          npm run build
          node -e "const fs=require('fs'); const pkg=require('./package.json'); const manifest=require('./manifest.json'); if (pkg.version !== manifest.version) throw new Error('package.json and manifest.json versions differ'); for (const file of ['main.js', 'manifest.json']) { if (!fs.existsSync(file)) throw new Error(`${file} is missing`); }"

      - name: Prepare release notes
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = require("./manifest.json").version;
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
          const heading = `## ${version}`;
          const start = changelog.indexOf(`${heading}\n`);
          if (start === -1) {
            throw new Error(`CHANGELOG.md is missing release notes for ${version}`);
          }
          const bodyStart = start + heading.length + 1;
          const nextHeading = changelog.indexOf("\n## ", bodyStart);
          const body = changelog.slice(bodyStart, nextHeading === -1 ? undefined : nextHeading).trim();
          if (!body) {
            throw new Error(`CHANGELOG.md release notes for ${version} are empty`);
          }
          fs.writeFileSync(".release-notes.md", body + "\n");
          NODE

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Check for optional styles
        id: styles
        run: |
          [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ] && [ "$tag" != "v$manifest_version" ]; then
            echo "Tag $tag must match manifest version $manifest_version or v$manifest_version"
            exit 1
          fi
          files=(main.js manifest.json)
          if [ "${{ steps.styles.outputs.exists }}" = "true" ]; then
            files+=(styles.css)
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" --clobber "${files[@]}"
            gh release edit "$tag" --title "$tag" --notes-file .release-notes.md
          else
            gh release create "$tag" --title "$tag" --notes-file .release-notes.md --draft "${files[@]}"
          fi
