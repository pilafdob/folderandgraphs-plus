name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify plugin
        run: |
          npm ci
          npm test
          npm run build
          node -e "const fs=require('fs'); const pkg=require('./package.json'); const manifest=require('./manifest.json'); if (pkg.version !== manifest.version) throw new Error('package.json and manifest.json versions differ'); for (const file of ['main.js', 'manifest.json']) { if (!fs.existsSync(file)) throw new Error(`${file} is missing`); }"

      - name: Check for optional styles
        id: styles
        run: |
          [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag $tag must match manifest version $manifest_version"
            exit 1
          fi
          files=(main.js manifest.json)
          if [ "${{ steps.styles.outputs.exists }}" = "true" ]; then
            files+=(styles.css)
          fi
          gh release create "$tag" --title "$tag" --draft "${files[@]}"
